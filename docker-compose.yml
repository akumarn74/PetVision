name: petvision-local

services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: petvision_db
    environment:
      POSTGRES_USER: petvision_user
      POSTGRES_PASSWORD: petvision_password
      POSTGRES_DB: petvision
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: petvision_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: always

  minio:
    image: minio/minio:latest
    container_name: petvision_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    restart: always

volumes:
  pgdata:
  redisdata:
  miniodata:
